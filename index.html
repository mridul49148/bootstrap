<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <link rel="stylesheet" href="Day 18/bootstrap.css">
</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center mb-4">
            Student Registration Form
        </h2>

        <form>

            <div class="mb-3">
                <label class="form-label">
                    Name
                </label>

                <input type="text" class="form-control" placeholder="Enter your name">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Email
                </label>

                <input type="email" class="form-control" placeholder="Enter your email">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Password
                </label>

                <input type="password" class="form-control" placeholder="Enter your password">
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Gender
                </label>

                <select class="form-select">
                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>
                </select>
            </div>

            <div class="mb-3">

                <label class="form-label">
                    Courses
                </label>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="html">

                    <label class="form-check-label" for="html">
                        HTML
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="css">

                    <label class="form-check-label" for="css">
                        CSS
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="bootstrap">

                    <label class="form-check-label" for="bootstrap">
                        Bootstrap
                    </label>
                </div>

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="javascript">

                    <label class="form-check-label" for="javascript">
                        JavaScript
                    </label>
                </div>

            </div>

            <div class="form-check mb-3">

                <input class="form-check-input" type="checkbox" id="terms">

                <label class="form-check-label" for="terms">

                    I agree to the Terms & Conditions

                </label>

            </div>
            <button class="btn btn-primary">
                Submit
            </button>

        </form>

    </div>

</body>

</html>
